name: Task
Description: Track an actionable implementation, docs, research, or verification task
Title: "[Task]: "
Labels: ["agent:ready"]
Body:
  - type: markdown
    attributes:
      value: |
        Use this for work that should map to one branch/PR or one evidence-backed operational action.
        The issue body must be self-contained enough for an agent to start without mining retired local phase plans.
        Read AGENTS.md first. If this issue conflicts with AGENTS.md, AGENTS.md wins unless the task explicitly updates it.
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should this issue accomplish?
      placeholder: "One or two sentences."
    validations:
      required: true
  - type: textarea
    id: task-context
    attributes:
      label: Task context
      description: Summarize the current facts, decisions, constraints, and background needed to work this issue. Do not make retired local implementation/phase plans required reading.
      placeholder: |
        This issue is the active task record.

        Current facts:
        - ...

        Relevant constraints:
        - ...

        Optional provenance:
        - Migrated from older local planning notes; those notes are historical unless explicitly named as canonical docs.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define what is in scope and out of scope.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of conditions required to close the issue.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and risk constraints
      description: Note destructive actions, external effects, secrets, manual testing, or human approval requirements.
      placeholder: |
        - Do not reset unrelated local changes.
        - No external/public action without owner approval.
    validations:
      required: false
  - type: textarea
    id: canonical-docs
    attributes:
      label: Canonical docs to obey, if any
      description: Link only evergreen contracts/runbooks that must be obeyed, such as AGENTS.md, README.md, or current API docs. Do not list retired plans as the task definition.
      placeholder: |
        - AGENTS.md — repo engineering contract
        - README.md — current user-facing behavior
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification required
      description: Commands, manual checks, or evidence required before completion.
      placeholder: |
        ```bash
        npm run build
        ```
    validations:
      required: true
  - type: textarea
    id: completion-evidence
    attributes:
      label: Completion evidence required
      description: What the PR body or closing comment must include.
      value: |
        Final PR or closing comment must include:
        - Commands run
        - Output summary
        - Tests added/updated, or why not applicable
        - Docs updated, or why not applicable
        - Remaining risks / gaps
    validations:
      required: true
